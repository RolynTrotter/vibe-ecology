<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0c1016" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Vibe Ecology</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- World view -->
  <canvas id="view"></canvas>

  <!-- Top-left: ecosystem readout -->
  <div id="hud" class="panel">
    <div class="hud-top">
      <div class="stat"><span class="label">Health</span><span id="score">–</span></div>
      <div class="stat"><span class="label">Critters</span><span id="total">0</span></div>
      <div class="stat"><span class="label">Tick</span><span id="tick">0</span></div>
      <div class="stat"><span class="label">FPS</span><span id="fps">0</span></div>
    </div>
    <div id="species"></div>
  </div>

  <!-- Top-right: minimap -->
  <div id="minimap-wrap" class="panel">
    <canvas id="minimap" width="220" height="160"></canvas>
    <div id="legend"></div>
  </div>

  <!-- Bottom: population graph -->
  <canvas id="graph" class="panel"></canvas>

  <!-- Bottom-right: controls -->
  <div id="controls">
    <button id="btn-play" title="Play / Pause">⏸</button>
    <button id="btn-speed" title="Speed">1×</button>
    <button id="btn-graph" class="active" title="Toggle graph">📈</button>
    <button id="btn-reset" title="Regenerate world">⟳</button>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
